name: Bootstrap
description: Setup Node.js and install dependencies via pnpm. Run AFTER actions/checkout, since local composite actions cannot replace checkout.

inputs:
  install-filter:
    description: pnpm --filter selector limiting the install; empty installs the whole workspace.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
      with:
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install dependencies
      shell: bash
      env:
        INSTALL_FILTER: ${{ inputs.install-filter }}
      run: |
        if [ -n "$INSTALL_FILTER" ]; then
          pnpm install --frozen-lockfile --filter "$INSTALL_FILTER"
        else
          pnpm install --frozen-lockfile
        fi
