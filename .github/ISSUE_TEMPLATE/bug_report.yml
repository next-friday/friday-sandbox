name: Bug Report
description: A component, hook, or config misbehaves
title: "fix(<scope>): <one-line symptom>"
labels: ["type:fix"]
body:
  - type: markdown
    attributes:
      value: |
        ## Title style — Hybrid Convention

        Bug issues use the `fix` type and describe the observable symptom in one line: `fix(<scope>): <symptom>`.

        Examples:

        - `fix(button): onClick fires twice when disabled`
        - `fix(eslint-config): import/no-unresolved breaks on .ts paths`
        - `fix(typescript-config): nextjs preset misses moduleResolution`

        Prohibited in any title: `+` as shorthand. Use `and` or commas.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing the symptom in plain language.
      placeholder: "Button fires onClick twice when the disabled prop transitions from true to false during render."
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - "@friday-sandbox/react"
        - "@friday-sandbox/styles"
        - "@friday-sandbox/eslint-config"
        - "@friday-sandbox/typescript-config"
    validations:
      required: true

  - type: input
    id: surface
    attributes:
      label: Component, hook, utility, or preset
      description: The specific export that misbehaves (component name, hook name, ESLint config preset, or TS config preset).
      placeholder: "Button"
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - Incorrect runtime behavior
        - Visual regression
        - Accessibility regression
        - Performance regression
        - Type error or wrong type
        - Build, lint, or config failure
        - Documentation mismatch
    validations:
      required: true

  - type: input
    id: package_version
    attributes:
      label: Package version
      placeholder: "0.0.0"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: React version, Node version, browser, or framework where applicable.
      placeholder: "React 19.2, Node 24, Chrome 140"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal source that triggers the bug. Inline TSX is fine.
      render: tsx
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs actual
      description: What the code should do, and what it does instead.
      placeholder: |
        - Expected: onClick fires once per user click
        - Actual: onClick fires twice when disabled flips off
    validations:
      required: true
