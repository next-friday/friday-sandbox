name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality / ${{ matrix.check }}
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        check:
          [
            lint,
            typecheck,
            knip,
            format:check,
            depcruise,
            build:storybook,
            sort:check,
            lint:symmetry,
            lint:md,
          ]
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: ./.github/common-actions/bootstrap
      - run: pnpm ${{ matrix.check }}

  actionlint:
    name: Quality / actionlint
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d
        with:
          reporter: local
          filter_mode: nofilter
          fail_level: error

  zizmor:
    name: Quality / zizmor
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d
        with:
          advanced-security: false
          annotations: true

  test:
    name: Verify / test (${{ matrix.node }})
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: ["22"]
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: ./.github/common-actions/bootstrap
        with:
          node-version: ${{ matrix.node }}
      - name: Install Playwright browsers
        run: pnpm --filter @friday-sandbox/react exec playwright install --with-deps chromium
      - run: pnpm test

  build:
    name: Verify / build
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: ./.github/common-actions/bootstrap
      - run: pnpm build

  ci-success:
    name: CI Success
    needs: [quality, actionlint, zizmor, test, build]
    if: ${{ always() && github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - name: Fail if any required job did not succeed
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "upstream results: $RESULTS"
          case "$RESULTS" in
            *failure* | *cancelled* | *skipped*)
              echo "::error::One or more CI jobs did not succeed." >&2
              exit 1
              ;;
          esac
          echo "All CI jobs succeeded."
