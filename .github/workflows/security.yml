name: Security

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: security
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: ./.github/common-actions/bootstrap
        with:
          install-filter: friday-sandbox
      - run: pnpm audit --audit-level high
