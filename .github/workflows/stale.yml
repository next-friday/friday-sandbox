name: Stale

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: stale
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  stale:
    name: Mark stale issues and pull requests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "status:stale"
          stale-pr-label: "status:stale"
          stale-issue-message: "This issue has been inactive for 60 days and is now marked stale. It will close in 14 days without further activity."
          stale-pr-message: "This pull request has been inactive for 60 days and is now marked stale. It will close in 14 days without further activity."
          exempt-issue-labels: "status:needs-human-review"
          exempt-all-milestones: true
