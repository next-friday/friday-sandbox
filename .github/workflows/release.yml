name: Release

on:
  push:
    branches: [main]
    paths:
      - ".changeset/**"
      - "packages/*/package.json"
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Version packages or publish to npm
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: release
      url: https://www.npmjs.com/package/@friday-sandbox/react
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}
      - uses: ./.github/common-actions/bootstrap
      - name: Build packages
        run: pnpm build
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d
        id: changesets
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
      - name: Tell bot reviewers to skip the version PR
        if: ${{ steps.changesets.outputs.hasChangesets == 'true' && steps.changesets.outputs.pullRequestNumber != '' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR: ${{ steps.changesets.outputs.pullRequestNumber }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR" --repo "$REPO" --add-label "skip-review"
          gh pr comment "$PR" --repo "$REPO" --body "@coderabbitai ignore"
          gh pr comment "$PR" --repo "$REPO" --body "/gemini ignore"
      - name: Enable auto-merge on the version PR
        if: ${{ steps.changesets.outputs.hasChangesets == 'true' && steps.changesets.outputs.pullRequestNumber != '' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR: ${{ steps.changesets.outputs.pullRequestNumber }}
          REPO: ${{ github.repository }}
        run: gh pr merge "$PR" --repo "$REPO" --auto --squash
