name: Preview release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  preview:
    name: Publish preview package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/common-actions/bootstrap
      - run: pnpm build
      - run: pnpm dlx pkg-pr-new publish './packages/react' './packages/styles' './packages/eslint-config' './packages/typescript-config'
