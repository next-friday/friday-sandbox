name: Preview release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  preview:
    name: Publish preview package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: ./.github/common-actions/bootstrap
      - run: pnpm build
      - run: pnpm dlx pkg-pr-new publish './packages/react' './packages/styles'
