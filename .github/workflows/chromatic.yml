name: Chromatic

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: chromatic-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  chromatic:
    name: Visual / chromatic
    if: ${{ github.event_name == 'push' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/common-actions/bootstrap
      - name: Publish to Chromatic
        uses: chromaui/action@7ffa9343588f15ff3f4cde30e03cd23204ed6a9c
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: packages/react
          buildScriptName: build:storybook
          onlyChanged: true
          exitZeroOnChanges: true
          autoAcceptChanges: main
