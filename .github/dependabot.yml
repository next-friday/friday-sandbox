version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    commit-message:
      prefix: chore
      include: scope
    groups:
      production-dependencies:
        dependency-type: production
        update-types: [minor, patch]
      development-dependencies:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    labels: ["dependencies"]
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        update-types: [minor, patch]
