have_fun: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: false

ignore_patterns:
  - "**/dist/**"
  - "**/coverage/**"
  - "**/storybook-static/**"
  - "pnpm-lock.yaml"
  - "**/CHANGELOG.md"
  - ".changeset/**"
  - "packages/*/package.json"
