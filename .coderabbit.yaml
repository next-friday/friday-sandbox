language: en-US
tone_instructions: >-
  Be terse. One sentence per finding: the problem, the location, the fix.
  Skip praise, skip restating the diff. Group by severity, highest first.
  If unsure, ask one specific question rather than guessing.
reviews:
  profile: assertive
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "chore(release):"
    ignore_usernames:
      - "dependabot[bot]"
      - "github-actions[bot]"
      - "next-friday-release[bot]"
  path_filters:
    - "!**/dist/**"
    - "!**/coverage/**"
    - "!**/storybook-static/**"
    - "!**/.turbo/**"
    - "!pnpm-lock.yaml"
    - "!**/CHANGELOG.md"
    - "!.changeset/**"
    - "!**/*.snap"
  path_instructions:
    - path: "**/*.{ts,tsx,mjs,cjs,css,sh,yaml,yml}"
      instructions: >-
        No comments in source or config; intent lives in names and the commit
        body. Flag any comment except a machine directive (a shebang, a
        /// <reference>, a @type JSDoc, a /* @__PURE__ */) or a scaffold under
        turbo/generators/templates/ or .github/ISSUE_TEMPLATE/. Any lint or type
        suppression (eslint-disable*, @ts-expect-error, @ts-ignore, @ts-nocheck,
        prettier-ignore, biome-ignore) is a comment — flag it; a suppression
        must be a root-cause fix, never a silenced gate.
    - path: packages/react/src/components/bases/**/*.{ts,tsx}
      instructions: >-
        Base components are scaffolded with "pnpm gen component" (turbo gen), never
        hand-created, and live in components/bases/<name>/ as <name>.tsx +
        <name>.styles.ts (its own tv() variant map) + index.ts +
        <name>.stories.tsx; the variant map is linked to @friday-sandbox/styles'
        CSS by a fri-<name> class, mirrored across the package boundary. Priorities, highest first: accessibility, correctness, API ergonomics,
        then style. Key checks: lowercase filename, named export with colocated Props,
        no default export; "use client" only when a client API — or a react-aria or
        radix client primitive — is touched, never on a pure layout or text component;
        wrap the right primitive (react-aria-components for interactive, a radix part
        for a compound component, native HTML for layout or text) and flag hand-rolled
        keyboard or focus where a primitive exists; props widen from the primitive
        (ComponentPropsWithRef<typeof X>), render-prop primitives compose className
        through composeTailwindRenderProps, keep data-slot; variants use
        tailwind-variants tv() mapping every value to a distinct fri-<name>-<value>
        class with the repo vocabulary (primary..danger, solid..plain, xs..xl) and
        defaultVariants, never a hardcoded color (wire the --fri-<role> ladder); a new
        file is reachable through the exports map's one public entry (. -> ./src/index.ts) via
        the barrel chain; a behavior change (feat | fix | perf | refactor) carries a
        .changeset/*.md entry.
    - path: packages/react/src/**/*.stories.{ts,tsx}
      instructions: >-
        Stories ARE the tests (Vitest browser mode via @storybook/addon-vitest +
        Playwright chromium). Key checks: a showcase story per variant axis (Variants,
        Colors, Sizes, laid out with Flex/Grid — never a raw div, and pull placeholder
        content from the samples subpath (@friday-sandbox/react/samples: Boxes, Lorem))
        and per state, real props not mocked data,
        addon-a11y passes; play functions assert behavior only where it fits — an
        interactive base gets Default (userEvent.tab -> toHaveFocus), a display or layout base (text, flex,
        grid, separator, spinner) skips the userEvent interaction plays, so never ask one for an
        interaction play. Story copy reads as
        consumer documentation, so flag internal class names (fri-button-*,
        fri-flex-*), library names (tailwind-variants, react-aria,
        react-aria-components), engine math (calc(var(--fri-spacing-xs) *
        var(--_button-n))), or file paths; copy stays generic, not brittle, so flag
        concrete pixel sizes or an exhaustive enumeration of a prop's values, and
        prefer the imperative "Use the `X` prop to ..." form; symmetric story shape
        across files (summary -> Import snippet -> stylesheet note -> CSS snippet,
        same prop wording and second-person tone).
    - path: packages/react/src/**/*.test.{ts,tsx}
      instructions: >-
        This repository has no separate test files; a behavior is verified by its
        story, run in Vitest browser mode. Flag a new *.test.* file and ask for
        the behavior to be covered by a *.stories.tsx play function instead.
    - path: packages/eslint-config/src/*.mjs
      instructions: >-
        Keep all three subpath exports (./base, ./next-js, ./react-internal)
        resolving in consumer workspaces. Flag a rule added to one preset that
        belongs in another, a plugin import without a matching peer dep, or a
        severity flipped without a noted reason.
    - path: packages/typescript-config/src/*.json
      instructions: >-
        The preset trio (base.json, nextjs.json, react-library.json) must agree
        on lib, moduleResolution, jsx, target, strict, and verbatimModuleSyntax
        unless a framework difference justifies otherwise.
    - path: packages/styles/src/**/*.css
      instructions: >-
        A component's rules live in src/components/<name>.css under
        @layer components, keyed to the fri-<name> class, and must mirror its
        tv() variant map (<name>.styles.ts, in @friday-sandbox/react) 1:1 —
        every fri-<name>-<value> class has a rule and vice versa (the
        lint:symmetry gate enforces it, across the package boundary); flag an
        orphan either side. Style through @apply — a .fri-*/base declaration is
        @apply <utility>; a property Tailwind has no utility for is a named
        @utility in layers/utilities.css, @apply'd, never a raw declaration in a
        component/base rule (raw lives only in @utility bodies and the token layer;
        --* custom-property defs are var machinery). Respect the @layer system; no
        hardcoded colors outside the token layer; no global selectors that bypass
        layers; wire colors through the --fri-<role> ladder and geometry through a
        component-local ramp multiplier (--_<name>-n) with the md default at zero
        specificity via :where(.fri-<name>); canonical Tailwind alias for a var
        mapped in @theme inline (bg-primary, not bg-(--fri-primary)). Size tokens
        scoped to action, field, or box, never a literal component name; corner
        radius derives from an archetype token (--fri-action/field/box-radius)
        scaled by the component size ramp, applied as rounded-(--<name>-radius); the
        themes/ CSS is hand-authored token values (keep the @theme map in
        sync with the token names). A token
        rename carries a migration note in the changeset.
    - path: apps/docs/**/*.{ts,tsx}
      instructions: >-
        Documentation site on Next.js App Router and Fumadocs. It consumes the
        published @friday-sandbox/react and @friday-sandbox/styles packages, so
        flag a component re-implemented here instead of imported, and a deep
        import that bypasses the package exports map. "use client" only when a
        client API is touched; keep demos on the real public component API.
    - path: apps/docs/content/docs/**/*.mdx
      instructions: >-
        Component documentation prose and examples. Examples must use the real exported
        prop names and types; flag a documented prop the component does not
        expose. Import snippets use the package name, not a workspace path.
    - path: .github/workflows/**/*.yml
      instructions: >-
        Third-party actions must be pinned to a commit SHA, not a tag. Each job
        sets a tight timeout-minutes and a minimal permissions block. Top-level
        permissions stay read-only; job-level grants only the scopes that step
        needs. Run step-security/harden-runner first.
    - path: .github/scripts/**/*.sh
      instructions: >-
        Shell scripts start with set -euo pipefail. Quote every variable
        expansion. Read inputs from explicit env vars, not positional args.
    - path: ".changeset/!(*README*).md"
      instructions: >-
        Bump level (patch | minor | major) must match the PR type. A feat is at
        least minor, a breaking change is major. The summary reads as a release
        note to a downstream consumer, not as an internal log.
    - path: "**/*.{md,mdx}"
      instructions: >-
        Prose follows the editorial style guide in STYLE.md. Flag a banned
        marketing adjective, an off-vocabulary synonym, a switch of narrator or
        voice within one document, or maintainer-internal detail in a consumer
        page. Component docs under apps/docs/content/docs/components carry the
        sections Import, Usage, Purpose, When to use, When not to use, feature
        sections, Props, Styling, Accessibility, after a SourceLinks header.
        Demos dogfood the design system — Text for text and headings, Button for
        buttons, Lorem for placeholder copy, Flex/Grid for layout; never a raw
        div/span/p/button (lint:symmetry enforces it).
chat:
  auto_reply: true
knowledge_base:
  opt_out: false
  learnings:
    scope: local
  issues:
    scope: local
  pull_requests:
    scope: local
